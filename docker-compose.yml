services:
  # Database
  wassila-db:
    image: mysql:8.0
    container_name: wassila-db
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: wassila
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - wassila-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  # Backend (Laravel API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wassila-backend
    environment:
      APP_NAME: Wassila
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000

      DB_CONNECTION: mysql
      DB_HOST: wassila-db
      DB_PORT: 3306
      DB_DATABASE: wassila
      DB_USERNAME: root
      DB_PASSWORD: "root"

      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database

      # CORS - Allow frontend
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/vendor
    depends_on:
      wassila-db:
        condition: service_healthy
    networks:
      - wassila-net
    command: >
      sh -c "composer install &&
             php artisan key:generate --force &&
             php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wassila-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - wassila-net
    command: npm run dev -- --host 0.0.0.0

volumes:
  mysql-data:

networks:
  wassila-net:
    driver: bridge
